var bh=Math.max(1,Math.round(3600/is)),rH=H[Math.max(0,H.length-1-bh)],chg1h=rH?(pr/rH.c-1)*100:null;

var vd=null,dok=false,lh=H[H.length-1];if(lh.bv!=null&&!isNaN(+lh.bv)){vd=0;for(i=Math.max(0,H.length-bh);i<H.length;i++)vd+=(2*(+H[i].bv)-H[i].v)*H[i].c;dok=true}

if(k==="momentum"){rq(num(c.chg10)&&c.chg10>t.chg10,"10m");rq(num(c.oiC)&&c.oiC>t.oiChg1h,"OIΔ");if(c.dok)rq(c.vd>t.volDelta1h,"VolΔ");rq(num(c.funding)&&c.funding>t.fundMin&&c.funding<t.fundMax,"fund");rq(c.vol1h>t.vol1h,"vol1h")}
